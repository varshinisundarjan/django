<!-- course_details_bootstrap.html -->

{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ course.name }} - Details</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h2>{{ course.name }}</h2>
            </div>
            <div class="card-body">
                {% if course.lessons.all %}
                    <ul class="list-group">
                        {% for lesson in course.lessons.all %}
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                {{ lesson.title }}
                                <span class="badge bg-secondary">{{ lesson.created_at|date:"M d, Y" }}</span>
                            </li>
                        {% endfor %}
                    </ul>
                {% else %}
                    <p class="text-muted">No lessons available for this course.</p>
                {% endif %}
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
